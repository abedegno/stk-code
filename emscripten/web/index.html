<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">

    <title>SuperTuxKart Web</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="coi-serviceworker.js"></script>
    <script>
      // Prevent Emscripten from calling main() automatically.
      // We need to download and extract game assets first.
      var Module = typeof Module !== "undefined" ? Module : {};
      Module["noInitialRun"] = true;
      Module["onRuntimeInitialized"] = function() {
        globalThis.ready = true;
      };
    </script>
    <script src="game/supertuxkart.js"></script>
    <script src="script.js" type="module" defer></script>

    <style>
      * {
        font-family: Arial, sans-serif;
        box-sizing: border-box;
      }
      p, label, select {
        font-size: 12px;
        margin: 4px;
      }
      body {
        margin: 0px;
      }
      #canvas {
        background-color: #222222;
        position: absolute;
        top: 0px;
        left: 0px;
        z-index: 1;
        width: 100vw;
        height: 100vh;
      }
      #info_container {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 480px;
        height: 320px;
        margin-left: -240px;
        margin-top: -160px;
        z-index: 2;
        background-color: white;
        padding: 12px;
        padding-top: 6px;
        border-radius: 8px;
        overflow-y: auto;
      }
      #header_bar {
        display: flex;
        align-items: center;
        gap: 18px;
      }
      #status_bar {
        display: flex;
        align-items: center;
        margin-top: 12px;
        gap: 6px;
      }
      #start_button {
        border: none;
        outline: none;
        padding: 8px;
        padding-left: 12px;
        padding-right: 12px;
        border-radius: 8px;
      }
    </style>
  </head>

  <body>
    <canvas id="canvas"></canvas>
    <div id="info_container">
      <div id="header_bar">
        <h1 style="margin: 0px;">SuperTuxKart Web</h1>
      </div>
      <p>This is a WebAssembly build of SuperTuxKart, compiled using Emscripten.</p>
      <p>There is a 100MB+ initial download (core assets, then tracks), and the game requires around 500MB of memory.</p>
      <p>Based on the Emscripten port by <a href="https://github.com/ading2210/">ading2210</a>.</p>
      <label for="quality_select">Texture quality:</label>
      <select name="quality_select" id="quality_select" style="margin: 0px;">
        <option value="low">Low (~110MiB)</option>
        <option value="mid">Medium (~155MiB)</option>
        <option value="high">High (~220MiB)</option>
      </select>
      <div id="status_bar">
        <button id="start_button" disabled>Start Game</button>
        <p id="status_text">Loading game code...</p>
      </div>
    </div>
  </body>
</html>
